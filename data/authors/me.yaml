bio: |
  My name is Leonardo Kimura, and I am a PhD student at the University of São Paulo, Brazil, supervised by Marcos Simplicio. Currently, I am visiting Aarhus University, Denmark, hosted by Diego Aranha.

  My research focuses on cryptographic applications with the potential to make a real-world impact. In particular, I work on electronic voting systems, with interests in transparency, usability, Internet voting, and the design of new voting applications.

